{% if pages > 1 %}
<nav>
    <ul class="pagination">
        {% for p in range(1, pages + 1) %}
        <li class="page-item {% if p == page %}active{% endif %}">
            <a class="page-link" href="?page={{ p }}{% if q %}&q={{ q }}{% endif %}{% if status_filter %}&status={{ status_filter }}{% endif %}">{{ p }}</a>
        </li>
        {% endfor %}
    </ul>
</nav>
{% endif %}
