{% extends "base.html" %}
{% block title %}Настройки{% endblock %}
{% block content %}
<h1 class="h3 mb-3">Настройки (.env)</h1>
<form method="post" class="card card-body">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <div class="row g-3">
        {% for key in editable %}
        <div class="col-md-6">
            <label class="form-label">{{ key }}</label>
            <input class="form-control" name="{{ key }}" value="{{ settings.get(key, '') }}">
        </div>
        {% endfor %}
    </div>
    <div class="mt-3 d-flex gap-2">
        <button class="btn btn-primary">Сохранить</button>
        <span class="text-muted">Токены скрыты и не редактируются здесь.</span>
    </div>
</form>
{% endblock %}
